version: "3.8"

services:
  db:
    image: mysql:8
    container_name: db_cont
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: notes_db
    ports:
      - "3306:3306"

  web:
    build: .
    container_name: django_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_NAME: notes_db
      DB_USER: root
      DB_PASSWORD: rootpassword
    depends_on:
      - db
